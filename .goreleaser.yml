version: 2

project_name: sip

builds:
  - id: sip
    main: ./cmd/sip
    binary: sip
    env:
      - CGO_ENABLED=0

checksum:
  name_template: checksums.txt

changelog:
  sort: asc

brews:
  - name: sip
    homepage: https://github.com/jerrydzj/sip
    description: mood-based chinese poetry cli
    license: MIT
    directory: Formula
    test: |
      system "#{bin}/sip", "calm"
    repository:
      owner: jerrydzj
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
